spring.main.web-application-type=none
spring.main.banner-mode=off
spring.main.log-startup-info=false
logging.level.root=WARN
logging.level.io.modelcontextprotocol=OFF

# Point the OpenAI client at the local mock (posts to /v1/chat/completions).
spring.ai.openai.base-url=${MOCK_URL:http://127.0.0.1:8900}
spring.ai.openai.api-key=sk-mock-not-a-real-key
spring.ai.openai.chat.options.model=mock-model
spring.ai.openai.chat.options.temperature=0

# Shared stdio MCP server (same binary as every other framework).
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.type=SYNC
spring.ai.mcp.client.toolcallback.enabled=true
spring.ai.mcp.client.stdio.connections.bench.command=${MCP_PYTHON}
spring.ai.mcp.client.stdio.connections.bench.args[0]=${BENCH_REPO}/benchmarks/mcp_server.py
