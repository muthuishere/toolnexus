name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Each language's suite is hermetic (no network, no LLM): local HTTP servers for
# the HTTP/client tests, the shared examples/ fixtures for skills.
jobs:
  conformance:
    name: Cross-port option parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      # Fails if a ClientOptions/ToolkitOptions field ships in some ports but not all six
      # (the drift class that hid the JS disableTools/disableSkills gap). No deps.
      - run: python3 conformance/check_options_parity.py

  js:
    name: JS (node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm test

  python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]"
      - run: python -m pytest -q

  go:
    name: Go (go test -race)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: golang
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  java:
    name: Java (gradle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: ./gradlew test --no-daemon

  csharp:
    name: C# (dotnet)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: csharp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet build
      - run: dotnet test

  elixir:
    name: Elixir (mix)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"
      - uses: actions/cache@v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: mix-${{ runner.os }}-${{ hashFiles('elixir/mix.lock') }}
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix coveralls   # runs the suite + enforces minimum_coverage 95 (coveralls.json)
